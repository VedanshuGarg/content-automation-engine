spring.application.name=content-automation-engine

# Database Configuration
datasource.url=jdbc:postgresql://localhost:5432/automation_db
datasource.username=${DB_USER:postgres}
datasource.password=${DB_PASSWORD:password}
datasource.driver-class-name=org.postgresql.Driver

jpa.hibernate.ddl-auto=update
jpa.show-sql=false

# OAuth2 Client Configuration for Social Platforms
security.oauth2.client.registration.youtube.client-id=${YOUTUBE_CLIENT_ID:mock-google-client-id}
security.oauth2.client.registration.youtube.client-secret=${YOUTUBE_CLIENT_SECRET:mock-google-secret}
security.oauth2.client.registration.youtube.scope=https://www.googleapis.com/auth/youtube.upload
security.oauth2.client.registration.youtube.authorization-grant-type=authorization_code
security.oauth2.client.registration.instagram.client-id=${IG_CLIENT_ID:mock-meta-client-id}
security.oauth2.client.registration.instagram.client-secret=${IG_CLIENT_SECRET:mock-meta-secret}
security.oauth2.client.registration.instagram.scope=instagram_basic,instagram_content_publish
security.oauth2.client.registration.instagram.authorization-grant-type=authorization_code

# Background Task Scheduling Configuration
task.scheduling.pool.size=5 # Allows multiple social media posts to be published concurrently
task.scheduling.thread-name-prefix=content-scheduler-
